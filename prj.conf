#enabel gpio support
CONFIG_GPIO=y

#enabel flash support
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_NVS=y
CONFIG_MPU_ALLOW_FLASH_WRITE=y

#enabel internal clock
CONFIG_CLOCK_CONTROL_NRF_K32SRC_RC=y

#enabel rtt 
CONFIG_USE_SEGGER_RTT=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_LOG=y

# Enable Bluetooth
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y

# Enable extended advertising support
CONFIG_BT_EXT_ADV=y

CONFIG_BT_CTLR_ADV_EXT=y
CONFIG_BT_CTLR_ADV_DATA_LEN_MAX=1024

# Logging (optional but useful)
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3

# Device name
CONFIG_BT_DEVICE_NAME="ISC_05"
CONFIG_BT_DEVICE_NAME_DYNAMIC=y

#enbel memory protection unit
CONFIG_ARM_MPU=y
# MEMFAULT_COREDUMP_COMPUTE_THREAD_STACK_USAGE=y
# THREAD_STACK_INFO =y
# STACK_GROWS_UP =n 
# INIT_STACKS =n
# MEMFAULT =n
# CONFIG_STACK_SENTINEL=y
# CONFIG_STACK_CANARIES=y
CONFIG_THREAD_NAME=y

# # Example – adjust to your project
# CONFIG_LOG_PROCESS_THREAD_STACK_SIZE=2048

# # Keep UART console enabled
# CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y

# # Enable UART logging backend as well
# CONFIG_LOG_BACKEND_UART=y

# CONFIG_SERIAL=y
# CONFIG_NRFX_UARTE0=y
CONFIG_REBOOT=y